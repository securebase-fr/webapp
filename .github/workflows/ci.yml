name: DevSecOps Pipeline (Cloud)

on:
  workflow_dispatch:   # TP2 : pipeline DevSecOps lancable manuellement (ne se declenche plus a chaque push)

permissions:
  contents: read
  security-events: write

jobs:
  # 1. Tests unitaires + couverture
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test
      - name: Sauvegarder la couverture
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # 2. SonarQube Cloud (SAST & qualite du code)
  sonar-check:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Recuperer la couverture
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage
      - name: Analyse SonarQube Cloud
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.qualitygate.wait=true

  # 3. Trivy - scan des dependances (SCA)
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan du systeme de fichiers
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

  # 4. Build de l'image Docker
  build-image:
    needs: [ sonar-check, dependency-scan ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build de l'image
        run: docker build -t my-app:${{ github.sha }} .
      - name: Exporter l'image
        run: docker save my-app:${{ github.sha }} -o my-image.tar
      - name: Upload de l'image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: my-image.tar

  # 5. Trivy - scan de l'image (conteneur)
  container-scan:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: .
      - name: Charger l'image
        run: docker load -i my-image.tar
      - name: Scan de l'image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'my-app:${{ github.sha }}'
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'
